<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="toggle-group">
    <button
      id="modeToggle"
      class="btn-toggle mode-toggle"
      type="button"
      aria-label="Switch to analog clock"
      aria-pressed="false"
      title="Toggle clock mode"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
    </button>
    <button
      id="themeToggle"
      class="btn-toggle theme-toggle"
      type="button"
      aria-label="Switch to light mode"
      aria-pressed="false"
      title="Toggle theme"
    >
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" />
      </svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41
                 M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
      </svg>
    </button>
  </div>

  <header class="page-header">
    <div class="page-eyebrow">Live &middot; Global Time</div>
    <h1 class="page-title">
      World <span class="page-title-accent">Clock</span>
    </h1>
    <p class="page-subtitle">
      <span class="live-dot" aria-hidden="true"></span>
      Synchronized across six cities
    </p>
  </header>

  <main class="clock-grid" id="clockGrid" aria-label="World clocks"></main>

  <footer class="page-footer">
    Updates every second &middot; All times local
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
