<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock</title>
  <style>
    /* ── Reset & Base ────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background-color: var(--bg-base);
      background-image:
        radial-gradient(
          ellipse 80% 50% at 50% -10%,
          rgba(110, 168, 254, 0.07) 0%,
          transparent 70%
        );
      color: var(--text-primary);
      font-family: var(--font-ui);
      min-height: 100dvh;
      padding: 3rem 1.5rem 4rem;
    }

    /* ── Page Header ─────────────────────────────────────────────── */
    .page-header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .page-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-accent);
      margin-bottom: 1rem;
      opacity: 0.8;
    }

    .page-eyebrow::before,
    .page-eyebrow::after {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--accent-dim);
    }

    .page-title {
      font-family: var(--font-ui);
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text-primary);
    }

    .page-title-accent {
      color: var(--text-accent);
    }

    .page-subtitle {
      margin-top: 0.75rem;
      font-size: 0.875rem;
      color: var(--text-tertiary);
      letter-spacing: 0.02em;
    }

    /* ── Clock Grid ──────────────────────────────────────────────── */
    .clock-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      max-width: 1080px;
      margin: 0 auto;
    }

    @media (max-width: 860px) {
      .clock-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      .clock-grid {
        grid-template-columns: 1fr;
      }

      body {
        padding: 2rem 1rem 3rem;
      }
    }

    /* ── Clock Card ──────────────────────────────────────────────── */
    .clock-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-card);
      padding: 1.75rem 1.75rem 1.625rem;
      box-shadow: var(--shadow-card);
      cursor: default;
      position: relative;
      overflow: hidden;
      transition:
        transform var(--transition-card),
        box-shadow var(--transition-card),
        background-color var(--transition-card),
        border-color var(--transition-card);

      /* Entrance animation */
      animation: cardReveal 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) both;
    }

    @keyframes cardReveal {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Top-edge accent line */
    .clock-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        var(--accent-dim) 30%,
        var(--accent-primary) 50%,
        var(--accent-dim) 70%,
        transparent 100%
      );
      opacity: 0;
      transition: opacity var(--transition-card);
    }

    /* Subtle glow behind card on hover */
    .clock-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-card);
      background: radial-gradient(
        ellipse 80% 60% at 50% 0%,
        var(--accent-glow) 0%,
        transparent 70%
      );
      opacity: 0;
      transition: opacity var(--transition-card);
      pointer-events: none;
    }

    .clock-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      background-color: var(--bg-card-hover);
      border-color: var(--border-accent);
    }

    .clock-card:hover::before { opacity: 1; }
    .clock-card:hover::after  { opacity: 1; }

    /* ── Card Inner Layout ───────────────────────────────────────── */
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.375rem;
    }

    .city-name {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .city-country {
      font-size: 0.6875rem;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
      margin-top: 0.2rem;
      text-transform: uppercase;
    }

    .tz-badge {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-accent);
      background: rgba(110, 168, 254, 0.1);
      border: 1px solid rgba(110, 168, 254, 0.2);
      border-radius: var(--radius-badge);
      padding: 0.25em 0.55em;
      line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    /* ── Time Display ────────────────────────────────────────────── */
    .time-display {
      position: relative;
    }

    .time-hm {
      font-family: var(--font-mono);
      font-size: clamp(2rem, 4vw, 2.5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text-time);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .time-sep {
      opacity: 0.45;
      display: inline-block;
      animation: colonBlink 1s step-start infinite;
    }

    @keyframes colonBlink {
      0%,  49% { opacity: 0.45; }
      50%, 100% { opacity: 0.12; }
    }

    .time-seconds-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-top: 0.375rem;
    }

    .time-ss {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }

    .time-ampm {
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-accent);
      opacity: 0.85;
    }

    /* ── Date Display ────────────────────────────────────────────── */
    .card-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 1.125rem 0 0.875rem;
    }

    .date-display {
      font-size: 0.75rem;
      color: var(--text-secondary);
      letter-spacing: 0.01em;
    }

    /* ── Footer ──────────────────────────────────────────────────── */
    .page-footer {
      text-align: center;
      margin-top: 3rem;
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      color: var(--text-tertiary);
      letter-spacing: 0.08em;
      opacity: 0.6;
    }

    /* ── Live indicator dot ──────────────────────────────────────── */
    .live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
      animation: livePulse 2s ease-out infinite;
      vertical-align: middle;
      margin-right: 0.375rem;
    }

    @keyframes livePulse {
      0%   { box-shadow: 0 0 0 0   rgba(34, 197, 94, 0.5); }
      60%  { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0);   }
      100% { box-shadow: 0 0 0 0   rgba(34, 197, 94, 0);   }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <div class="page-eyebrow">Live &middot; Global Time</div>
    <h1 class="page-title">
      World <span class="page-title-accent">Clock</span>
    </h1>
    <p class="page-subtitle">
      <span class="live-dot" aria-hidden="true"></span>
      Synchronized across six cities
    </p>
  </header>

  <main class="clock-grid" id="clock-grid" aria-label="World clocks"></main>

  <footer class="page-footer">
    Updates every second &middot; All times local
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
