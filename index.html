<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Clock</title>
  <style>
    /* ── Custom Properties ───────────────────────────────────────── */
    :root {
      --bg-base:          #0d0f12;
      --bg-surface:       #131720;
      --bg-card:          #161b24;
      --bg-card-hover:    #1b2130;

      --border-subtle:    rgba(255, 255, 255, 0.06);
      --border-card:      rgba(255, 255, 255, 0.09);
      --border-accent:    rgba(110, 168, 254, 0.35);

      --accent-primary:   #6ea8fe;
      --accent-glow:      rgba(110, 168, 254, 0.12);
      --accent-dim:       rgba(110, 168, 254, 0.55);

      --text-primary:     #e8eaf0;
      --text-secondary:   #8b95a6;
      --text-tertiary:    #525e70;
      --text-time:        #f0f4ff;
      --text-accent:      #6ea8fe;

      --shadow-card:      0 2px 12px rgba(0, 0, 0, 0.4),
                          0 1px 3px rgba(0, 0, 0, 0.5);
      --shadow-hover:     0 8px 32px rgba(0, 0, 0, 0.6),
                          0 2px 8px rgba(0, 0, 0, 0.4),
                          0 0 0 1px rgba(110, 168, 254, 0.18),
                          0 0 24px rgba(110, 168, 254, 0.06);

      --radius-card:      14px;
      --radius-badge:     5px;

      --font-ui:          -apple-system, BlinkMacSystemFont, "Segoe UI",
                          "Helvetica Neue", Arial, sans-serif;
      --font-mono:        "SF Mono", "Cascadia Code", "Fira Code",
                          "Consolas", "Courier New", monospace;

      --transition-card:  200ms cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    /* ── Reset & Base ────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background-color: var(--bg-base);
      background-image:
        radial-gradient(
          ellipse 80% 50% at 50% -10%,
          rgba(110, 168, 254, 0.07) 0%,
          transparent 70%
        );
      color: var(--text-primary);
      font-family: var(--font-ui);
      min-height: 100dvh;
      padding: 3rem 1.5rem 4rem;
    }

    /* ── Page Header ─────────────────────────────────────────────── */
    .page-header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .page-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-accent);
      margin-bottom: 1rem;
      opacity: 0.8;
    }

    .page-eyebrow::before,
    .page-eyebrow::after {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--accent-dim);
    }

    .page-title {
      font-family: var(--font-ui);
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text-primary);
    }

    .page-title-accent {
      color: var(--text-accent);
    }

    .page-subtitle {
      margin-top: 0.75rem;
      font-size: 0.875rem;
      color: var(--text-tertiary);
      letter-spacing: 0.02em;
    }

    /* ── Clock Grid ──────────────────────────────────────────────── */
    .clock-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      max-width: 1080px;
      margin: 0 auto;
    }

    @media (max-width: 860px) {
      .clock-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      .clock-grid {
        grid-template-columns: 1fr;
      }

      body {
        padding: 2rem 1rem 3rem;
      }
    }

    /* ── Clock Card ──────────────────────────────────────────────── */
    .clock-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-card);
      padding: 1.75rem 1.75rem 1.625rem;
      box-shadow: var(--shadow-card);
      cursor: default;
      position: relative;
      overflow: hidden;
      transition:
        transform var(--transition-card),
        box-shadow var(--transition-card),
        background-color var(--transition-card),
        border-color var(--transition-card);

      /* Entrance animation */
      animation: cardReveal 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) both;
    }

    .clock-card:nth-child(1) { animation-delay: 0.04s; }
    .clock-card:nth-child(2) { animation-delay: 0.09s; }
    .clock-card:nth-child(3) { animation-delay: 0.14s; }
    .clock-card:nth-child(4) { animation-delay: 0.19s; }
    .clock-card:nth-child(5) { animation-delay: 0.24s; }
    .clock-card:nth-child(6) { animation-delay: 0.29s; }

    @keyframes cardReveal {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Top-edge accent line */
    .clock-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        var(--accent-dim) 30%,
        var(--accent-primary) 50%,
        var(--accent-dim) 70%,
        transparent 100%
      );
      opacity: 0;
      transition: opacity var(--transition-card);
    }

    /* Subtle glow behind card on hover */
    .clock-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-card);
      background: radial-gradient(
        ellipse 80% 60% at 50% 0%,
        var(--accent-glow) 0%,
        transparent 70%
      );
      opacity: 0;
      transition: opacity var(--transition-card);
      pointer-events: none;
    }

    .clock-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      background-color: var(--bg-card-hover);
      border-color: var(--border-accent);
    }

    .clock-card:hover::before { opacity: 1; }
    .clock-card:hover::after  { opacity: 1; }

    /* ── Card Inner Layout ───────────────────────────────────────── */
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.375rem;
    }

    .city-name {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .city-country {
      font-size: 0.6875rem;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
      margin-top: 0.2rem;
      text-transform: uppercase;
    }

    .tz-badge {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-accent);
      background: rgba(110, 168, 254, 0.1);
      border: 1px solid rgba(110, 168, 254, 0.2);
      border-radius: var(--radius-badge);
      padding: 0.25em 0.55em;
      line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    /* ── Time Display ────────────────────────────────────────────── */
    .time-display {
      position: relative;
    }

    .time-hm {
      font-family: var(--font-mono);
      font-size: clamp(2rem, 4vw, 2.5rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text-time);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .time-sep {
      opacity: 0.45;
      display: inline-block;
      animation: colonBlink 1s step-start infinite;
    }

    @keyframes colonBlink {
      0%,  49% { opacity: 0.45; }
      50%, 100% { opacity: 0.12; }
    }

    .time-seconds-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-top: 0.375rem;
    }

    .time-ss {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }

    .time-ampm {
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-accent);
      opacity: 0.85;
    }

    /* ── Date Display ────────────────────────────────────────────── */
    .card-divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 1.125rem 0 0.875rem;
    }

    .date-display {
      font-size: 0.75rem;
      color: var(--text-secondary);
      letter-spacing: 0.01em;
    }

    /* ── Footer ──────────────────────────────────────────────────── */
    .page-footer {
      text-align: center;
      margin-top: 3rem;
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      color: var(--text-tertiary);
      letter-spacing: 0.08em;
      opacity: 0.6;
    }

    /* ── Live indicator dot ──────────────────────────────────────── */
    .live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
      animation: livePulse 2s ease-out infinite;
      vertical-align: middle;
      margin-right: 0.375rem;
    }

    @keyframes livePulse {
      0%   { box-shadow: 0 0 0 0   rgba(34, 197, 94, 0.5); }
      60%  { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0);   }
      100% { box-shadow: 0 0 0 0   rgba(34, 197, 94, 0);   }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <div class="page-eyebrow">Live &middot; Global Time</div>
    <h1 class="page-title">
      World <span class="page-title-accent">Clock</span>
    </h1>
    <p class="page-subtitle">
      <span class="live-dot" aria-hidden="true"></span>
      Synchronized across six cities
    </p>
  </header>

  <main class="clock-grid" id="clockGrid" aria-label="World clocks"></main>

  <footer class="page-footer">
    Updates every second &middot; All times local
  </footer>

  <script>
    'use strict';

    // ── City definitions ─────────────────────────────────────────────
    const CITIES = [
      { name: 'New York',    country: 'United States',  tz: 'America/New_York'    },
      { name: 'London',      country: 'United Kingdom', tz: 'Europe/London'       },
      { name: 'Dubai',       country: 'UAE',            tz: 'Asia/Dubai'          },
      { name: 'Mumbai',      country: 'India',          tz: 'Asia/Kolkata'        },
      { name: 'Tokyo',       country: 'Japan',          tz: 'Asia/Tokyo'          },
      { name: 'Los Angeles', country: 'United States',  tz: 'America/Los_Angeles' },
    ];

    // ── Formatter cache ──────────────────────────────────────────────
    const fmtCache = Object.create(null);

    function getFormatters(tz) {
      if (fmtCache[tz]) return fmtCache[tz];
      fmtCache[tz] = {
        hm: new Intl.DateTimeFormat('en-US', {
          timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: true,
        }),
        ss: new Intl.DateTimeFormat('en-US', {
          timeZone: tz, second: '2-digit',
        }),
        date: new Intl.DateTimeFormat('en-US', {
          timeZone: tz, weekday: 'short', month: 'short',
          day: 'numeric', year: 'numeric',
        }),
        tzName: new Intl.DateTimeFormat('en-US', {
          timeZone: tz, timeZoneName: 'short',
        }),
      };
      return fmtCache[tz];
    }

    function getTimeParts(tz, date) {
      const { hm, ss } = getFormatters(tz);
      const hmParts = hm.formatToParts(date);
      const ssParts = ss.formatToParts(date);
      const val = (parts, type) => {
        const p = parts.find(x => x.type === type);
        return p ? p.value : '';
      };
      return {
        hours:   val(hmParts, 'hour'),
        minutes: val(hmParts, 'minute'),
        seconds: val(ssParts, 'second').padStart(2, '0'),
        ampm:    val(hmParts, 'dayPeriod'),
      };
    }

    function getTZAbbr(tz, date) {
      const parts = getFormatters(tz).tzName.formatToParts(date);
      const p = parts.find(x => x.type === 'timeZoneName');
      return p ? p.value : '';
    }

    // ── Build card DOM safely (no innerHTML) ─────────────────────────
    function el(tag, className) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      return node;
    }

    function buildCard(city) {
      const card = el('article', 'clock-card');
      card.setAttribute('aria-label', city.name + ' local time');

      // Header
      const header  = el('div', 'card-header');
      const meta    = el('div');
      const nameEl  = el('div', 'city-name');
      const cntryEl = el('div', 'city-country');
      const badge   = el('div', 'tz-badge');

      nameEl.textContent  = city.name;
      cntryEl.textContent = city.country;
      meta.appendChild(nameEl);
      meta.appendChild(cntryEl);
      header.appendChild(meta);
      header.appendChild(badge);
      card.appendChild(header);

      // Time display
      const timeWrap = el('div', 'time-display');
      const hmRow    = el('div', 'time-hm');
      const hoursEl  = el('span');
      const sepEl    = el('span', 'time-sep');
      const minsEl   = el('span');
      sepEl.textContent = ':';
      hmRow.appendChild(hoursEl);
      hmRow.appendChild(sepEl);
      hmRow.appendChild(minsEl);
      timeWrap.appendChild(hmRow);

      const ssRow   = el('div', 'time-seconds-row');
      const ssWrap  = el('span', 'time-ss');
      const ssColon = document.createTextNode(':');
      const secsEl  = el('span');
      const ampmEl  = el('span', 'time-ampm');
      ssWrap.appendChild(ssColon);
      ssWrap.appendChild(secsEl);
      ssRow.appendChild(ssWrap);
      ssRow.appendChild(ampmEl);
      timeWrap.appendChild(ssRow);
      card.appendChild(timeWrap);

      // Divider
      const divider = el('div', 'card-divider');
      divider.setAttribute('role', 'separator');
      card.appendChild(divider);

      // Date
      const dateWrap = el('div', 'date-display');
      const dateEl   = el('span');
      dateWrap.appendChild(dateEl);
      card.appendChild(dateWrap);

      return {
        card,
        refs: { badge, hoursEl, minsEl, secsEl, ampmEl, dateEl },
      };
    }

    // ── Mount cards ──────────────────────────────────────────────────
    const grid    = document.getElementById('clockGrid');
    const cardMap = Object.create(null); // tz → refs

    CITIES.forEach(city => {
      const { card, refs } = buildCard(city);
      grid.appendChild(card);
      cardMap[city.tz] = refs;
    });

    // ── Tick ─────────────────────────────────────────────────────────
    function tick() {
      const now = new Date();

      CITIES.forEach(city => {
        const refs  = cardMap[city.tz];
        const parts = getTimeParts(city.tz, now);
        const fmts  = getFormatters(city.tz);

        refs.hoursEl.textContent = parts.hours;
        refs.minsEl.textContent  = parts.minutes;
        refs.secsEl.textContent  = parts.seconds;
        refs.ampmEl.textContent  = parts.ampm;
        refs.dateEl.textContent  = fmts.date.format(now);

        // Only write if changed (DST transitions are rare)
        const abbr = getTZAbbr(city.tz, now);
        if (refs.badge.textContent !== abbr) {
          refs.badge.textContent = abbr;
        }
      });
    }

    tick();                        // immediate render — no blank flash on load
    setInterval(tick, 1000);
  </script>
</body>
</html>
